<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #1a4a8a;
    --deep:    #1550a0;
    --panel:   #1e60c0;
    --mid:     #2878e0;
    --bright:  #4a9fff;
    --light:   #7abfff;
    --pale:    #c2dcff;
    --frost:   #eaf4ff;
    --gold:    #ffe0a0;
    --white:   #f8fbff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: linear-gradient(160deg, #1a4a8a 0%, #2060b8 50%, #1a4a8a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated gradient bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 55% at 20% 35%, rgba(100,180,255,0.22) 0%, transparent 65%),
      radial-gradient(ellipse 50% 45% at 80% 70%, rgba(50,130,220,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(150,210,255,0.12) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { opacity: 1; transform: scale(1); }
    50%  { opacity: 0.7; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* SVG wave canvas */
  #waveBg {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.18;
  }

  /* Floating blobs */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    filter: blur(60px);
    animation: drift var(--d) ease-in-out infinite alternate;
  }
  .orb1 { width: 280px; height: 280px; background: rgba(120,200,255,0.25); top: -80px; left: -60px; --d: 9s; }
  .orb2 { width: 200px; height: 200px; background: rgba(80,160,255,0.2); bottom: 8%; right: -50px; --d: 13s; }
  .orb3 { width: 160px; height: 160px; background: rgba(200,230,255,0.15); top: 40%; left: 55%; --d: 10s; }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to   { transform: translate(20px, 15px); }
  }

  .screen {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 24px 20px;
  }

  /* ===== WELCOME ===== */
  #welcome { text-align: center; }

  .welcome-icon {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 28px;
    animation: gentle-float 4s ease-in-out infinite;
  }

  @keyframes gentle-float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .welcome-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.7rem, 5vw, 2.8rem);
    color: var(--frost);
    line-height: 1.3;
    margin-bottom: 12px;
    letter-spacing: 0.01em;
  }

  .welcome-title em {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }

  .welcome-sub {
    font-weight: 200;
    font-size: 0.78rem;
    color: var(--pale);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    margin-bottom: 52px;
    opacity: 0.6;
  }

  .btn-next {
    background: rgba(255,255,255,0.1);
    color: var(--frost);
    border: 1px solid rgba(220,240,255,0.4);
    padding: 14px 56px;
    border-radius: 3px;
    font-family: 'Jost', sans-serif;
    font-size: 0.76rem;
    font-weight: 300;
    cursor: pointer;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-next::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.35s;
  }

  .btn-next:hover {
    border-color: rgba(220,240,255,0.75);
    background: rgba(255,255,255,0.18);
    box-shadow: 0 0 28px rgba(100,180,255,0.25);
    color: white;
  }

  .btn-next:hover::before { opacity: 1; }
  .btn-next:active { transform: scale(0.98); }

  /* ===== GAME ===== */
  #game {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  .game-header { text-align: center; }

  .game-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: var(--frost);
    margin-bottom: 5px;
  }

  .game-subtitle {
    font-weight: 200;
    font-size: 0.7rem;
    color: var(--pale);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    max-width: 390px;
    width: 100%;
  }

  .card {
    aspect-ratio: 3/4;
    cursor: pointer;
    perspective: 900px;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-back-face {
    background: linear-gradient(145deg, #1550a0, #1e68d0);
    border: 1px solid rgba(150,210,255,0.22);
    box-shadow: 0 4px 14px rgba(10,40,100,0.35);
    overflow: hidden;
  }

  .card-back-face::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(150,210,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(150,210,255,0.07) 1px, transparent 1px);
    background-size: 10px 10px;
  }

  .card-back-face::after {
    content: '◇';
    font-size: 1.1rem;
    color: rgba(150,210,255,0.3);
    position: relative;
    z-index: 1;
  }

  .card-front-face {
    background: linear-gradient(145deg, #1e68d0, #3a90f0);
    border: 1px solid rgba(150,210,255,0.5);
    transform: rotateY(180deg);
    box-shadow: 0 4px 20px rgba(30,104,208,0.4);
  }

  .card-front-face .num {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 2.3rem;
    font-weight: 400;
    color: var(--gold);
  }

  .card.matched .card-front-face {
    background: linear-gradient(145deg, #1060c0, #2080e8);
    border-color: rgba(180,230,255,0.65);
    box-shadow: 0 4px 28px rgba(60,150,255,0.6), 0 0 0 1px rgba(150,210,255,0.3);
    animation: matchGlow 0.6s ease;
  }

  .card.matched .card-front-face .num { color: #e0f2ff; }

  @keyframes matchGlow {
    0%  { transform: rotateY(180deg) scale(1); }
    40% { transform: rotateY(180deg) scale(1.1); box-shadow: 0 8px 40px rgba(30,110,255,0.8); }
    100%{ transform: rotateY(180deg) scale(1); }
  }

  .score-bar { display: flex; gap: 7px; }

  .score-pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(200,230,255,0.2);
    border: 1px solid rgba(200,230,255,0.35);
    transition: all 0.4s;
  }

  .score-pip.done {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(255,224,160,0.6);
  }

  /* ===== RESULT ===== */
  #result {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  .result-enter {
    animation: resultReveal 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  @keyframes resultReveal {
    from { opacity: 0; transform: translateY(36px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .result-glass-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 22px;
    animation: gentle-float 3s ease-in-out infinite;
  }

  .result-pre {
    font-weight: 200;
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--pale);
    opacity: 0.6;
    margin-bottom: 2px;
  }

  .result-going {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: var(--pale);
    opacity: 0.85;
    margin-bottom: 2px;
  }

  .result-place {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(2.2rem, 7vw, 4rem);
    color: var(--gold);
    line-height: 1.05;
    margin-bottom: 34px;
    text-shadow: 0 0 50px rgba(232,201,126,0.2);
    letter-spacing: -0.01em;
  }

  .result-card {
    background: rgba(20,60,130,0.55);
    border: 1px solid rgba(180,220,255,0.25);
    border-radius: 14px;
    padding: 22px 24px;
    width: 100%;
    max-width: 300px;
    box-shadow: 0 16px 50px rgba(10,30,80,0.4), 0 0 0 1px rgba(120,180,255,0.1);
    backdrop-filter: blur(14px);
  }

  .result-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid rgba(150,200,255,0.1);
  }

  .result-row:last-child { border-bottom: none; }

  .ricon {
    font-size: 1rem;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .result-row-text { text-align: left; flex: 1; }

  .result-label {
    display: block;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--pale);
    opacity: 0.6;
    margin-bottom: 3px;
  }

  .result-value {
    font-weight: 400;
    font-size: 0.9rem;
    color: var(--frost);
    letter-spacing: 0.01em;
  }

  /* Confetti */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; }

  .cp {
    position: absolute;
    top: -12px;
    left: var(--x);
    width: var(--w);
    height: var(--h);
    background: var(--c);
    border-radius: var(--r);
    animation: fall var(--dur) ease-in var(--del) forwards;
    transform: rotate(var(--rot));
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(540deg); opacity: 0; }
  }

  .fade-in { animation: fadeInScale 0.65s cubic-bezier(0.4,0,0.2,1) both; }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<canvas id="waveBg"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- WELCOME -->
<div class="screen" id="welcome">
  <span class="welcome-icon">🎂</span>
  <h1 class="welcome-title">Let's make something<br><em>special</em> for ur birthday!</h1>
  <p class="welcome-sub">a little surprise awaits</p>
  <button class="btn-next" onclick="startGame()">Next &nbsp;→</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="game-header">
    <h2 class="game-title">Find your destination</h2>
    <p class="game-subtitle">match the cards to reveal</p>
  </div>
  <div class="score-bar" id="scoreBar"></div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <span class="result-glass-icon">🥂</span>
  <p class="result-pre">we're</p>
  <p class="result-going">going to</p>
  <h2 class="result-place" id="resultPlace">—</h2>
  <div class="result-card">
    <div class="result-row">
      <span class="ricon">📅</span>
      <div class="result-row-text">
        <span class="result-label">Date</span>
        <span class="result-value">Wednesday, April 1st 2026</span>
      </div>
    </div>
    <div class="result-row">
      <span class="ricon">🕖</span>
      <div class="result-row-text">
        <span class="result-label">Time</span>
        <span class="result-value">19.00</span>
      </div>
    </div>
    <div class="result-row">
      <span class="ricon">📍</span>
      <div class="result-row-text">
        <span class="result-label">Place</span>
        <span class="result-value" id="resultPlaceSmall">—</span>
      </div>
    </div>
    <div class="result-row">
      <span class="ricon">👗</span>
      <div class="result-row-text">
        <span class="result-label">Dresscode</span>
        <span class="result-value">Black &amp; Jeans</span>
      </div>
    </div>
  </div>
</div>

<div class="confetti-wrap" id="confetti"></div>

<script>
// Wave background
(function() {
  const canvas = document.getElementById('waveBg');
  const ctx = canvas.getContext('2d');
  let t = 0;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const waves = [
    { amp: 38, freq: 0.012, speed: 0.012, y: 0.35, alpha: 0.5 },
    { amp: 28, freq: 0.018, speed: 0.008, y: 0.55, alpha: 0.35 },
    { amp: 20, freq: 0.025, speed: 0.015, y: 0.72, alpha: 0.25 },
  ];

  function drawWave(w) {
    const W = canvas.width, H = canvas.height;
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 4) {
      const y = w.y * H + Math.sin(x * w.freq + t * w.speed * 60) * w.amp
                        + Math.sin(x * w.freq * 1.7 + t * w.speed * 40) * w.amp * 0.4;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = `rgba(140,200,255,${w.alpha})`;
    ctx.fill();
  }

  function loop(ts) {
    t = ts / 1000;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    waves.forEach(drawWave);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

const destinations = { 1:'Senti Ristorante', 2:'19 Lorimer', 3:'Altero Bastronomie', 4:'AOM', 5:'Gijon Steakhouse' };
let flipped=[], locked=false;

function startGame() {
  document.getElementById('welcome').style.display = 'none';
  const g = document.getElementById('game');
  g.style.display = 'flex';
  g.classList.add('fade-in');
  buildGame();
}

function buildGame() {
  const nums = [1,2,3,4,5,6,1,2,3,4,5,6];
  for (let i = nums.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [nums[i],nums[j]] = [nums[j],nums[i]];
  }
  flipped=[]; locked=false;

  const grid = document.getElementById('cardGrid');
  grid.innerHTML='';

  const bar = document.getElementById('scoreBar');
  bar.innerHTML='';
  for (let i=0;i<5;i++) {
    const p=document.createElement('div');
    p.className='score-pip'; p.id='pip-'+i;
    bar.appendChild(p);
  }

  nums.forEach(num => {
    const card=document.createElement('div');
    card.className='card'; card.dataset.num=num;
    card.innerHTML=`<div class="card-inner">
      <div class="card-face card-back-face"></div>
      <div class="card-face card-front-face"><span class="num">${num===6?'◇':num}</span></div>
    </div>`;
    card.addEventListener('click',()=>flipCard(card));
    grid.appendChild(card);
  });
}

function flipCard(card) {
  if (locked||card.classList.contains('flipped')||card.classList.contains('matched')||flipped.length>=2) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length===2) { locked=true; setTimeout(checkMatch,880); }
}

function checkMatch() {
  const [a,b]=flipped;
  const nA=+a.dataset.num, nB=+b.dataset.num;
  if (nA===nB) {
    a.classList.add('matched'); b.classList.add('matched');
    if (nA!==6) {
      const done=document.querySelectorAll('.score-pip.done').length;
      const pip=document.getElementById('pip-'+done);
      if(pip) pip.classList.add('done');
      setTimeout(()=>showResult(nA), 700);
    } else { flipped=[]; locked=false; }
  } else {
    setTimeout(()=>{ a.classList.remove('flipped'); b.classList.remove('flipped'); flipped=[]; locked=false; }, 520);
  }
}

function showResult(num) {
  document.getElementById('game').style.display='none';
  const r=document.getElementById('result');
  r.style.display='flex';
  r.classList.add('result-enter');
  const place=destinations[num];
  document.getElementById('resultPlace').textContent=place;
  document.getElementById('resultPlaceSmall').textContent=place;
  launchConfetti();
}

function launchConfetti() {
  const colors=['#e8c97e','#4d9fff','#a8ccff','#f4f9ff','#7ec8e3','#b8d8ff'];
  const wrap=document.getElementById('confetti');
  wrap.innerHTML='';
  for (let i=0;i<90;i++) {
    const p=document.createElement('div');
    p.className='cp';
    const rect=Math.random()>.5;
    p.style.cssText=`--x:${Math.random()*100}%;--w:${rect?4+Math.random()*6:5+Math.random()*5}px;--h:${rect?8+Math.random()*10:5+Math.random()*5}px;--r:${rect?'2px':'50%'};--c:${colors[Math.floor(Math.random()*colors.length)]};--dur:${1.6+Math.random()*2.2}s;--del:${Math.random()*1.4}s;--rot:${Math.random()*360}deg;`;
    wrap.appendChild(p);
  }
}
</script>
</body>
</html>
